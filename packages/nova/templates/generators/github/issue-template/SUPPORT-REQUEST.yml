# ============================================================================
# SETUP INSTRUCTIONS
# ============================================================================
#
# Conditional content is injected automatically by the generator:
#
#   - Pronouns ([__WE__], [__US__], [__OUR__]) based on project.pronouns.
#   - GitHub sponsor ([__GITHUB_SPONSOR__]) from urls.fundSources.
#   - Legal agreements from legal-agreements/ when urls.termsOfUse or urls.privacyPolicy is set.
#
# ============================================================================
name: "Support Request"
description: "Get prioritized help with environment-specific deployment, general guidance, and upgrade assistance."
title: "[Support]: "
labels: [ "question" ]
body:
  - type: "markdown"
    attributes:
      value: "Please note that support requests are __granted solely to members__ who are [__OUR__] sponsors or have heavily contributed to this project (these contributors will be listed at the bottom of the `README.md` file). If you would like to sponsor [__US__], please consider checking out [__OUR__] [GitHub Sponsors](https://github.com/sponsors/[__GITHUB_SPONSOR__]) page."
  - type: "markdown"
    attributes:
      value: "Please __fill out the form with as much detail as possible__ to help [__US__] resolve your request in a timely fashion. Thank you!"
  - type: "markdown"
    attributes:
      value: "---"
  - type: "checkboxes"
    id: "pre-check"
    attributes:
      label: "Pre-check confirmation"
      description: "Before proceeding further, please confirm the following by checking each box. This confirmation is required. __All boxes MUST be checked; failure to comply will result in your request being closed.__"
      options:
        - label: "I am currently a sponsor or have heavily contributed to this project"
          required: true
        - label: "I have kept the original title prefix, __\"[Support]: \"__"
          required: true
  - type: "textarea"
    id: "what-happened"
    attributes:
      label: "Tell [__US__] exactly what happened"
      description: "Provide a comprehensive description of what you need help with and what result you expect."
      placeholder: "e.g. When I was doing ..., I expected ... to happen, but I got ... instead."
    validations:
      required: true
  - type: "textarea"
    id: "logs"
    attributes:
      label: "Logs relevant to this issue"
      description: "If you have any logs, you may copy and paste the logs related to this request here. This block will be automatically formatted into code, so __there is no need for backticks__ or special markup."
      render: "Shell"
[__LEGAL_AGREEMENTS__]
