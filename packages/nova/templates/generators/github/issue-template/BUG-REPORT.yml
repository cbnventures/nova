# ============================================================================
# SETUP INSTRUCTIONS
# ============================================================================
#
# Conditional content is injected automatically by the generator:
#
#   - Pronouns ([__WE__], [__US__], [__OUR__]) based on project.pronouns.
#   - Platform-specific fields from bug-report-fields/ based on project.platforms.
#   - Legal agreements from legal-agreements/ when urls.termsOfUse or urls.privacyPolicy is set.
#   - Screenshots field from bug-report-fields/screenshots.yml when
#     "screenshots" is listed in project.platforms.
#
# ============================================================================
name: "Bug Report"
description: "Found an unexpected issue or problem? Report it here."
title: "[Bug]: "
labels: [ "bug" ]
body:
  - type: "markdown"
    attributes:
      value: "[__WE__] truly appreciate you taking the time to share this bug report with [__US__]."
  - type: "markdown"
    attributes:
      value: "Please __fill out the form with as much detail as possible__ so [__WE__] can easily recreate the bug and work swiftly to assist you in resolving it. Thank you for your cooperation!"
  - type: "markdown"
    attributes:
      value: "---"
  - type: "checkboxes"
    id: "pre-check"
    attributes:
      label: "Pre-check confirmation"
      description: "Before proceeding further, please confirm the following by checking each box. This confirmation is crucial for [__US__] to effectively identify and address the bug. __All boxes MUST be checked; failure to comply will result in the immediate closure of this bug report.__"
      options:
        - label: "I have provided a descriptive title for the bug I am currently having"
          required: true
        - label: "I have kept the original title prefix, __\"[Bug]: \"__"
          required: true
        - label: "I have read the `README.md` file, and this is __NOT__ a duplicate bug report"
          required: true
        - label: "I am __NOT__ requesting a new feature"
          required: true
        - label: "I am __NOT__ requesting help related to a support request"
          required: true
  - type: "input"
    id: "email"
    attributes:
      label: "Your email address"
      description: "Help [__US__] easily get in touch with you if [__WE__] need more information. __If possible, please consider using an alias you have access to, as this information is publicly visible.__"
      placeholder: "e.g. user@example.com"
    validations:
      required: true
  - type: "textarea"
    id: "what-happened"
    attributes:
      label: "Tell [__US__] exactly what happened"
      description: "Provide a comprehensive description of __the steps or circumstances__ that led to the occurrence of this bug."
      placeholder: "e.g. When I was doing ..., I expected ... to happen, but I got ... instead."
    validations:
      required: true
  - type: "input"
    id: "program-version"
    attributes:
      label: "Program version"
      description: "What version of the program are you using?"
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
[__PLATFORM_FIELDS__]
  - type: "textarea"
    id: "logs"
    attributes:
      label: "Captured logs relevant to this report"
      description: "Copy and paste all logs related to this bug. __Do not include logs unrelated to this project.__ This block will be automatically formatted into code, so __there is no need for backticks__ or special markup."
      placeholder: "Please include logs relevant to this bug report. If this field is filled with irrelevant content (e.g., \"no logs\" or \"cannot find logs\"), this bug report will be closed immediately."
      render: "Shell"
    validations:
      required: true
  - type: "checkboxes"
    id: "post-check"
    attributes:
      label: "Post-check confirmation"
      description: "Before proceeding further, please confirm the following by checking each box. This confirmation is crucial for the consideration of this bug report. __All boxes MUST be checked; failure to comply will result in this bug report being closed.__"
      options:
        - label: "I have filled in the form __exactly as requested__ and did not attempt to circumvent form validation"
          required: true
[__LEGAL_AGREEMENTS__]
