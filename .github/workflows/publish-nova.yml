name: "Publish Nova"

run-name: "Publishing ${{ github.event.release.tag_name || 'manually' }}${{ github.event_name == 'workflow_dispatch' && inputs.dry-run && ' (dry run)' || '' }}"

on:
  release:
    types:
      - "published"

  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run without making changes"
        required: false
        type: "boolean"
        default: true

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

env:
  PUBLISH: "${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry-run) }}"
  ROOT_DIR: "./"

jobs:
  build:
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version-file: "${{ env.ROOT_DIR }}/package.json"
          package-manager-cache: false

      - name: "Install packages"
        run: |
          npm install -g npm@latest
          npm install
        working-directory: "${{ env.ROOT_DIR }}"

      - name: "Check project"
        run: |
          npx turbo run check --filter=@cbnventures/nova --filter=@cbnventures/docusaurus-preset-nova --filter=nova-docs --concurrency=2
        working-directory: "${{ env.ROOT_DIR }}"

      - name: "Build project"
        run: |
          npx turbo run build --filter=@cbnventures/nova --filter=@cbnventures/docusaurus-preset-nova --filter=nova-docs --concurrency=2
        working-directory: "${{ env.ROOT_DIR }}"

      - name: "Upload build artifacts"
        uses: "actions/upload-artifact@v4"
        with:
          name: "build-output"
          retention-days: 1
          path: |
            packages/nova/build
            packages/nova/bin
            packages/nova/package.json
            packages/docusaurus-preset-nova/build
            packages/docusaurus-preset-nova/package.json
            apps/docs/build

  publish-to-npm:
    needs: "build"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version-file: "${{ env.ROOT_DIR }}/package.json"
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      - name: "Remove deprecated .npmrc entries"
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

          if [ -f "$npmrc" ]; then
            sed -i '/^always-auth=/d' "$npmrc"
          fi

      - name: "Download build artifacts"
        uses: "actions/download-artifact@v4"
        with:
          name: "build-output"

      - name: "Configure authentication"
        env:
          NPM_TOKEN: "${{ secrets.NPM_TOKEN }}"
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "[Auth] Using NPM_TOKEN (token-based)."
            echo "NODE_AUTH_TOKEN=${NPM_TOKEN}" >> "$GITHUB_ENV"
          else
            echo "[Auth] Using trusted publishing (OIDC)."

            npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

            if [ -f "$npmrc" ]; then
              sed -i '/^\/\/registry\.npmjs\.org\/:_authToken/d' "$npmrc"
              echo "[Auth] Removed _authToken entry from .npmrc."
            fi
          fi

      - name: "Publish @cbnventures/nova to npm"
        run: |
          if [ "${PUBLISH}" = "true" ]; then
            echo "[Publish] Production."
            npm publish
          else
            echo "[Publish] Dry run."
            npm publish --dry-run
          fi
        working-directory: "./packages/nova"

      - name: "Publish @cbnventures/docusaurus-preset-nova to npm"
        run: |
          if [ "${PUBLISH}" = "true" ]; then
            echo "[Publish] Production."
            npm publish
          else
            echo "[Publish] Dry run."
            npm publish --dry-run
          fi
        working-directory: "./packages/docusaurus-preset-nova"

  publish-to-github-packages:
    needs: "build"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: "read"
      packages: "write"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version-file: "${{ env.ROOT_DIR }}/package.json"
          package-manager-cache: false
          registry-url: "https://npm.pkg.github.com"
          scope: "@${{ github.repository_owner }}"

      - name: "Remove deprecated .npmrc entries"
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

          if [ -f "$npmrc" ]; then
            sed -i '/^always-auth=/d' "$npmrc"
          fi

      - name: "Download build artifacts"
        uses: "actions/download-artifact@v4"
        with:
          name: "build-output"

      - name: "Configure authentication"
        run: |
          echo "[Auth] Using GITHUB_TOKEN."
          echo "NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"

      - name: "Publish @cbnventures/nova to GitHub Packages"
        run: |
          REPOSITORY_OWNER="@$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          PACKAGE_NAME=$(npm pkg get name --workspaces=false | jq -r '.')

          echo "[Scope] Owner is \"${REPOSITORY_OWNER}\" and package is \"${PACKAGE_NAME}\"."

          if [[ "$PACKAGE_NAME" != "$REPOSITORY_OWNER/"* ]]; then
            BASE=${PACKAGE_NAME##*/}
            NEW_NAME="$REPOSITORY_OWNER/$BASE"

            echo "[Scope] Scoping package name to \"${NEW_NAME}\"."

            npm pkg set name="$NEW_NAME"
          fi

          if [ "${PUBLISH}" = "true" ]; then
            echo "[Publish] Production."
            npm publish
          else
            echo "[Publish] Dry run."
            npm publish --dry-run
          fi

          npm pkg set name="$PACKAGE_NAME"
        working-directory: "./packages/nova"

      - name: "Publish @cbnventures/docusaurus-preset-nova to GitHub Packages"
        run: |
          REPOSITORY_OWNER="@$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          PACKAGE_NAME=$(npm pkg get name --workspaces=false | jq -r '.')

          echo "[Scope] Owner is \"${REPOSITORY_OWNER}\" and package is \"${PACKAGE_NAME}\"."

          if [[ "$PACKAGE_NAME" != "$REPOSITORY_OWNER/"* ]]; then
            BASE=${PACKAGE_NAME##*/}
            NEW_NAME="$REPOSITORY_OWNER/$BASE"

            echo "[Scope] Scoping package name to \"${NEW_NAME}\"."

            npm pkg set name="$NEW_NAME"
          fi

          if [ "${PUBLISH}" = "true" ]; then
            echo "[Publish] Production."
            npm publish
          else
            echo "[Publish] Dry run."
            npm publish --dry-run
          fi

          npm pkg set name="$PACKAGE_NAME"
        working-directory: "./packages/docusaurus-preset-nova"

  deploy-docs:
    needs: "build"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: "read"
    steps:
      - name: "Download build artifacts"
        uses: "actions/download-artifact@v4"
        with:
          name: "build-output"

      - name: "Deploy to Cloudflare Pages"
        if: "${{ env.PUBLISH == 'true' }}"
        uses: "cloudflare/wrangler-action@v3"
        with:
          apiToken: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          accountId: "${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
          command: "pages deploy ./apps/docs/build --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.event.repository.default_branch }}"
