<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <!-- Chevron right -->
  <polyline points="28,28 38,38 28,48" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.18" />

  <!-- Plus -->
  <line x1="140" y1="20" x2="140" y2="36" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.15" />
  <line x1="132" y1="28" x2="148" y2="28" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.15" />

  <!-- Dot -->
  <circle cx="80" cy="78" r="3.5" fill="white" opacity="0.14" />

  <!-- Slash -->
  <line x1="192" y1="68" x2="202" y2="88" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.16" />

  <!-- Hash -->
  <line x1="40" y1="118" x2="40" y2="138" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.15" />
  <line x1="50" y1="118" x2="50" y2="138" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.15" />
  <line x1="32" y1="125" x2="58" y2="125" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.15" />
  <line x1="32" y1="133" x2="58" y2="133" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.15" />

  <!-- Chevron left -->
  <polyline points="172,128 162,138 172,148" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.18" />

  <!-- Square -->
  <rect x="112" y="98" width="12" height="12" fill="none" stroke="white" stroke-width="2.5" opacity="0.14" rx="2" />

  <!-- Curly brace open -->
  <path d="M88,178 Q82,190 88,202" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.16" />

  <!-- Equals -->
  <line x1="152" y1="208" x2="172" y2="208" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.15" />
  <line x1="152" y1="215" x2="172" y2="215" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.15" />

  <!-- Dot -->
  <circle cx="210" cy="168" r="3" fill="white" opacity="0.12" />

  <!-- Semicolon -->
  <circle cx="220" cy="28" r="2.5" fill="white" opacity="0.15" />
  <line x1="220" y1="33" x2="218" y2="40" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.15" />

  <!-- Dot -->
  <circle cx="30" cy="210" r="2.5" fill="white" opacity="0.12" />
</svg>
